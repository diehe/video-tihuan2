name: Release Desktop Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v0.1.0
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        shell: bash
        run: rustup default stable

      - name: Install FFmpeg
        shell: bash
        run: brew install ffmpeg

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run package:app

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  windows:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        shell: bash
        run: rustup default stable

      - name: Install FFmpeg
        shell: powershell
        run: choco install ffmpeg -y

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run package:app

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  release:
    name: Publish download page
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows

    steps:
      - name: Download app installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t files < <(find release-assets -type f | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release assets found" >&2
            exit 1
          fi

          notes=$'包含 macOS 和 Windows 桌面安装包。\n\nmacOS 首次打开如遇到系统安全提示，请在系统设置中允许打开。'
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --clobber
          else
            gh release create "$TAG" "${files[@]}" --title "绿幕视频替换 ${TAG}" --notes "$notes"
          fi
