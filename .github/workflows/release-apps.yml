name: Release Desktop Apps

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release tag, for example v0.1.0
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  macos:
    name: Build macOS app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        shell: bash
        run: rustup default stable

      - name: Install FFmpeg
        shell: bash
        run: brew install ffmpeg

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run package:app

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  windows:
    name: Build Windows app
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Rust
        shell: bash
        run: rustup default stable

      - name: Install FFmpeg
        shell: powershell
        run: choco install ffmpeg -y

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows app
        run: npm run package:app:windows

      - name: Upload Windows installers
        uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  release:
    name: Publish download page
    runs-on: ubuntu-latest
    needs:
      - macos
      - windows

    steps:
      - name: Download app installers
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ inputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-upload
          mac_file="$(find release-assets -type f -name '*.dmg' | sort | head -n 1)"
          windows_file="$(find release-assets -type f -name '*.exe' | sort | head -n 1)"
          if [[ -z "$mac_file" || -z "$windows_file" ]]; then
            echo "Missing release assets" >&2
            find release-assets -type f | sort >&2
            exit 1
          fi

          cp "$mac_file" release-upload/video-tihuan-macos-aarch64.dmg
          cp "$windows_file" release-upload/video-tihuan-windows-x64-setup.exe
          mapfile -t files < <(find release-upload -type f | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release assets found" >&2
            exit 1
          fi

          notes=$'包含 macOS 和 Windows 桌面安装包。\n\n本版重点修复：\n- Windows 安装前会自动清理旧版残留的后端进程，避免覆盖 video-tihuan-engine.exe 时报“Error opening file for writing”。\n- Windows 打包流程会继续执行真实 packaged sidecar 音频烟测，确认导出视频存在音轨。\n\nWindows 用户请下载 video-tihuan-windows-x64-setup.exe。\nmacOS 首次打开如遇到系统安全提示，请在系统设置中允许打开。'
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "${files[@]}" --repo "$REPO" --clobber
          else
            gh release create "$TAG" "${files[@]}" --repo "$REPO" --title "绿幕视频替换 ${TAG}" --notes "$notes"
          fi
